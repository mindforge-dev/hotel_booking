name: CD - Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    environment: hotel_deployment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Build Next.js application
        run: pnpm build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure deploy directory exists
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}"

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            .next/ \
            public/ \
            prisma/ \
            prisma.config.ts \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            node_modules/ \
            next.config.ts \
            tsconfig.json \
            postcss.config.mjs \
            tailwind.config.ts \
            docker-entrypoint.sh \
            Dockerfile \
            docker-compose.yml

      - name: Upload archive to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/deploy.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/deploy.tar.gz

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -euo pipefail && \
             cd ${{ secrets.VPS_DEPLOY_PATH }} && \
             echo '📦 Extracting build output...' && \
             tar -xzf /tmp/deploy.tar.gz && \
             rm /tmp/deploy.tar.gz && \
             echo '🗄️ Running database migrations...' && \
             npx prisma migrate deploy && \
             echo '🌱 Seeding database...' && \
             npx prisma db seed || echo '⚠️ Seed already applied or skipped' && \
             echo '🔄 Restarting application...' && \
             if pm2 describe hotel-booking > /dev/null 2>&1; then \
               pm2 restart hotel-booking; \
             else \
               pm2 start npm --name hotel-booking -- start; \
             fi && \
             pm2 save && \
             echo '⏳ Health check...' && \
             sleep 10 && \
             RETRY=0 && \
             while [ \$RETRY -lt 30 ]; do \
               if curl -sf http://localhost:3000 > /dev/null 2>&1; then \
                 echo '✅ Application is healthy and deployed!'; \
                 exit 0; \
               fi; \
               RETRY=\$((RETRY + 1)); \
               echo \"  Attempt \$RETRY/30 - waiting...\"; \
               sleep 5; \
             done && \
             echo '❌ Health check failed' && \
             pm2 logs hotel-booking --lines 50 --nostream && \
             exit 1"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
