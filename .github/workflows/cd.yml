name: CD - Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    environment: hotel_deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ] || [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ] || [ -z "${{ secrets.VPS_DEPLOY_PATH }}" ]; then
            echo "ERROR: Missing one of the required secrets: VPS_SSH_KEY, VPS_HOST, VPS_USER, VPS_DEPLOY_PATH"
            exit 1
          fi

      - name: Install dependencies and build
        env:
          NEXT_PUBLIC_WEB_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_WEB_SOCKET_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'build-time-placeholder-not-for-production' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/db' }}
          WEBSOCKET_API_URL: ${{ secrets.WEBSOCKET_API_URL || 'https://placeholder.execute-api.ap-southeast-1.amazonaws.com/dev' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || 'placeholder' }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || 'placeholder' }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}
        run: |
          pnpm install --frozen-lockfile
          pnpm prisma generate || true
          pnpm build

      - name: Prune dev dependencies
        run: pnpm prune --production || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create deployment archive
        run: |
          tar --ignore-failed-read -czf /tmp/deploy.tar.gz \
            .next/ \
            public/ \
            prisma/ \
            prisma.config.ts \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            node_modules/ \
            next.config.* \
            tsconfig.json \
            postcss.config.* \
            tailwind.config.* \
            docker-entrypoint.sh \
            Dockerfile \
            docker-compose.yml

      - name: Upload archive to VPS
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            /tmp/deploy.tar.gz \
            "${{ secrets.VPS_USER }}"@"${{ secrets.VPS_HOST }}":/tmp/deploy.tar.gz

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}"@"${{ secrets.VPS_HOST }}" <<'REMOTE'
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            echo "🧹 Cleaning deploy directory (keeping only .env)..."
            # Remove everything except .env
            find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +

            echo "📦 Extracting build output..."
            tar -xzf /tmp/deploy.tar.gz -C .
            rm -f /tmp/deploy.tar.gz

            echo "🗄️ Running database migrations..."
            npx prisma migrate deploy || true

            echo "🌱 Seeding database..."
            npx prisma db seed || echo "⚠️ Seed skipped or already applied"

            echo "🔄 Restarting application..."
            pm2 stop hotel-booking 2>/dev/null || true
            pm2 delete hotel-booking 2>/dev/null || true
            pm2 start npm --name hotel-booking -- start
            pm2 save

            echo "⏳ Health check..."
            sleep 10
            RETRY=0
            while [ $RETRY -lt 30 ]; do
              if curl -sfS http://localhost:81/ >/dev/null 2>&1; then
                echo "✅ Application is healthy and deployed!"
                exit 0
              fi
              RETRY=$((RETRY + 1))
              echo "  Attempt $RETRY/30 - waiting..."
              sleep 5
            done

            echo "❌ Health check failed. Showing recent logs:"
            pm2 logs hotel-booking --lines 100 --nostream || true
            exit 1
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
