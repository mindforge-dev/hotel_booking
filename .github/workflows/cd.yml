name: CD - Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Build Next.js application
        run: pnpm build

      - name: Create deployment archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            .next/ \
            public/ \
            prisma/ \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            node_modules/ \
            next.config.ts \
            tsconfig.json \
            postcss.config.mjs \
            tailwind.config.ts \
            .env.example \
            docker-entrypoint.sh \
            Dockerfile \
            docker-compose.yml

      - name: Upload deployment archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "/tmp/deploy.tar.gz"
          target: "/tmp/deploy.tar.gz"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            # Extract the deployment archive
            echo "📦 Extracting build output..."
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # Run database migrations
            echo "🗄️ Running database migrations..."
            npx prisma migrate deploy

            # Restart the application with pm2
            echo "🔄 Restarting application..."
            if pm2 describe hotel-booking > /dev/null 2>&1; then
              pm2 restart hotel-booking
            else
              pm2 start npm --name "hotel-booking" -- start
            fi
            pm2 save

            # Health check
            echo "⏳ Waiting for application health check..."
            sleep 10

            MAX_RETRIES=30
            RETRY_COUNT=0

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "✅ Application is healthy and deployed!"
                exit 0
              fi

              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "  Attempt $RETRY_COUNT/$MAX_RETRIES - waiting..."
              sleep 5
            done

            echo "❌ Health check failed after $MAX_RETRIES attempts"
            pm2 logs hotel-booking --lines 50 --nostream
            exit 1
