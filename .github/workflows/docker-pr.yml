name: Docker Build Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.json'
      - '**/*.css'
      - 'Dockerfile*'
      - 'docker-entrypoint.sh'
      - 'prisma/**'
      - 'pnpm-lock.yaml'
      - 'postcss.config.*'
      - 'tailwind.config.*'
      - 'next.config.*'

jobs:
  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@postgres:5432/db
          tags: hotel-booking:pr-${{ github.event.pull_request.number }}
